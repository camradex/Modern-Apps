# Tuned to fit GitHub Actions runners (7GB RAM). Gradle + Kotlin daemon heaps
# combined stay well under the limit while still building all modules.
org.gradle.jvmargs=-Xmx3584m -Xms512m -XX:MaxMetaspaceSize=512m -XX:+UseG1GC -Dfile.encoding=UTF-8
kotlin.daemon.jvm.options=-Xmx1536m

# Use more workers in parallel for multi-module compilation.
org.gradle.parallel=true
org.gradle.workers.max=4
org.gradle.caching=true

# Modern defaults
kotlin.code.style=official

# Performance & Optimization
org.gradle.configuration-cache=true
android.enableR8.fullMode=true

# Preview Support (Remove once SDK 37 is stable)
android.suppressUnsupportedCompileSdk=37.0
